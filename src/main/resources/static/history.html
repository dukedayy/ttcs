<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-PENDING { color: #f39c12; font-weight: bold; }
        .status-CANCELLED { color: #e74c3c; font-weight: bold; }
        .status-COMPLETED { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-uppercase" href="shop.html"><i class="fas fa-store me-2"></i>Duke Shop</a>
        <div class="d-flex align-items-center">
            <a href="shop.html" class="btn btn-outline-light me-2"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="cart.html" class="btn btn-outline-light"><i class="fas fa-shopping-cart"></i> Giỏ hàng</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <h3 class="fw-bold mb-4">Lịch sử đơn hàng</h3>
    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Mã đơn</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody id="order-list">
                </tbody>
            </table>
        </div>
        <div id="empty-msg" class="text-center text-muted d-none py-4">
            Bạn chưa có đơn hàng nào.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const BASE_URL = 'http://localhost:8080/api/v1/customer';
    let token = localStorage.getItem('ACCESS_TOKEN');

    window.onload = function() {
        if (!token) {
            window.location.href = 'auth.html';
            return;
        }
        fetchOrders();
    };

    async function fetchOrders() {
        try {
            const response = await fetch(`${BASE_URL}/order-list`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            renderOrders(data);
        } catch (error) {
            alert("Lỗi kết nối máy chủ khi tải đơn hàng!");
        }
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('order-list');
        const emptyMsg = document.getElementById('empty-msg');
        tbody.innerHTML = '';

        if (!orders || orders.length === 0) {
            emptyMsg.classList.remove('d-none');
            return;
        }

        orders.forEach(order => {
            const tr = document.createElement('tr');
            let actionBtn = '';

            if (order.status === 'PENDING') {
                actionBtn = `<button class="btn btn-sm btn-danger" onclick="cancelOrder('${order.id}')">Hủy đơn</button>`;
            } else {
                actionBtn = `<button class="btn btn-sm btn-secondary" disabled>Không thể hủy</button>`;
            }

            tr.innerHTML = `
                <td class="fw-bold">${order.orderCode || order.id.substring(0,8)}</td>
                <td>${new Date(order.createdAt).toLocaleString('vi-VN')}</td>
                <td class="text-danger fw-bold">${formatCurrency(order.finalAmount || order.totalAmount)}</td>
                <td class="status-${order.status}">${order.status}</td>
                <td>${actionBtn}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function cancelOrder(orderId) {
        if (!confirm('Bạn có chắc chắn muốn hủy đơn hàng này?')) return;

        try {
            const response = await fetch(`${BASE_URL}/cancel-order?orderId=${orderId}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert('Đã hủy đơn hàng thành công!');
                fetchOrders();
            } else {
                const data = await response.json();
                alert('Lỗi: ' + (data.message || 'Không thể hủy đơn hàng!'));
            }
        } catch (error) {
            alert('Lỗi kết nối máy chủ!');
        }
    }

    function formatCurrency(amount) {
        if (!amount) return '0 ₫';
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    }
</script>
</body>
</html>
