<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - Giỏ hàng & Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-cart td { vertical-align: middle; }
        .img-thumbnail { width: 80px; height: 80px; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-uppercase" href="shop.html"><i class="fas fa-store me-2"></i>Duke Shop</a>
        <div class="d-flex align-items-center">
            <a href="shop.html" class="btn btn-outline-light me-2"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-4">

        <div class="col-lg-8">
            <div class="card p-4">
                <h4 class="fw-bold mb-4">Giỏ hàng của bạn</h4>
                <div class="table-responsive">
                    <table class="table table-cart">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody id="cart-items">
                        </tbody>
                    </table>
                </div>
                <div id="empty-cart-msg" class="text-center text-muted d-none py-4">
                    Giỏ hàng trống. Hãy quay lại cửa hàng để chọn món đồ yêu thích nhé!
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4">
                <h4 class="fw-bold mb-4">Thông tin giao hàng</h4>
                <form id="checkout-form" onsubmit="placeOrder(event)">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Người nhận</label>
                        <input type="text" class="form-control" id="receiverName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" class="form-control" id="receiverPhone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ giao hàng</label>
                        <input type="text" class="form-control" id="shippingAddress" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phương thức thanh toán</label>
                        <select class="form-select" id="paymentMethod" required>
                            <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                            <option value="VNPAY">Chuyển khoản VNPay</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Ghi chú</label>
                        <textarea class="form-control" id="note" rows="2"></textarea>
                    </div>

                    <div class="d-flex justify-content-between mb-3 fs-5">
                        <span class="fw-bold">Tổng thanh toán:</span>
                        <span class="fw-bold text-danger" id="cart-total-price">0 ₫</span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold" id="btn-checkout">
                        ĐẶT HÀNG NGAY
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const BASE_URL = 'http://localhost:8080/api/v1/customer';
    let token = localStorage.getItem('ACCESS_TOKEN');
    let currentOrderItems = [];

    window.onload = function() {
        if (!token) {
            alert('Vui lòng đăng nhập!');
            window.location.href = 'auth.html';
            return;
        }
        fetchCart();
    };

    async function fetchCart() {
        try {
            const response = await fetch(`${BASE_URL}/cart`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            renderCart(data);
        } catch (error) {
            console.error("Lỗi tải giỏ hàng", error);
        }
    }

    function renderCart(cartData) {
        const tbody = document.getElementById('cart-items');
        const totalEl = document.getElementById('cart-total-price');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const btnCheckout = document.getElementById('btn-checkout');

        tbody.innerHTML = '';
        currentOrderItems = [];

        if (!cartData.items || cartData.items.length === 0) {
            emptyMsg.classList.remove('d-none');
            btnCheckout.disabled = true;
            totalEl.innerText = '0 ₫';
            return;
        }

        cartData.items.forEach(item => {
            currentOrderItems.push({
                productId: item.productId,
                quantity: item.amountInCart
            });

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="d-flex align-items-center gap-3">
                        <img src="${item.mainImageUrl || 'https://via.placeholder.com/80'}" class="img-thumbnail">
                        <span class="fw-bold">${item.productName}</span>
                    </div>
                </td>
                <td class="text-danger fw-bold">${formatCurrency(item.price)}</td>
                <td><span class="badge bg-secondary fs-6">${item.amountInCart}</span></td>
                <td class="text-danger fw-bold">${formatCurrency(item.subTotal)}</td>
            `;
            tbody.appendChild(tr);
        });

        totalEl.innerText = formatCurrency(cartData.totalPrice);
    }

    async function placeOrder(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-checkout');
        btn.disabled = true;
        btn.innerText = 'ĐANG XỬ LÝ...';

        const payload = {
            shippingAddress: document.getElementById('shippingAddress').value,
            receiverName: document.getElementById('receiverName').value,
            receiverPhone: document.getElementById('receiverPhone').value,
            paymentMethod: document.getElementById('paymentMethod').value,
            note: document.getElementById('note').value,
            items: currentOrderItems
        };

        try {
            const response = await fetch(`${BASE_URL}/order`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                alert(`Đặt hàng thành công! Mã đơn: ${data.orderCode}`);
                window.location.href = 'shop.html';
            } else {
                alert('Lỗi: ' + (data.message || JSON.stringify(data.errors)));
                btn.disabled = false;
                btn.innerText = 'ĐẶT HÀNG NGAY';
            }
        } catch (error) {
            alert('Lỗi kết nối máy chủ!');
            btn.disabled = false;
            btn.innerText = 'ĐẶT HÀNG NGAY';
        }
    }

    function formatCurrency(amount) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    }
</script>
</body>
</html>
