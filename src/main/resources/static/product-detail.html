<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Duke Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #4F46E5; --danger-color: #EF4444; --bg-light: #F3F4F6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: #1F2937; }
        .navbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .product-gallery-main { width: 100%; border-radius: 16px; object-fit: contain; background: #fff; max-height: 500px; padding: 1rem; border: 1px solid #E5E7EB; }
        .thumbnail { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #fff; }
        .thumbnail:hover, .thumbnail.active { border-color: var(--primary-color); }
        .price-sale { color: var(--danger-color); font-size: 2rem; font-weight: 800; }
        .price-original { text-decoration: line-through; color: #9CA3AF; font-size: 1.25rem; font-weight: 500; }
        .stat-item { font-size: 0.9rem; color: #4B5563; border-right: 1px solid #E5E7EB; padding-right: 1rem; margin-right: 1rem; }
        .stat-item:last-child { border: none; }
        .size-badge { border: 1px solid #D1D5DB; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .size-badge:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-add-cart { background-color: #E0E7FF; color: var(--primary-color); font-weight: 700; border: none; padding: 14px; border-radius: 12px; transition: 0.3s; }
        .btn-add-cart:hover { background-color: var(--primary-color); color: white; }
        .btn-buy-now { background-color: var(--danger-color); color: white; font-weight: 700; border: none; padding: 14px; border-radius: 12px; transition: 0.3s; }
        .btn-buy-now:hover { background-color: #DC2626; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="shop.html"><i class="fas fa-layer-group me-2"></i>DUKE.POS</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <a href="cart.html" class="btn btn-light rounded-circle p-2 shadow-sm"><i class="fas fa-shopping-bag fs-5"></i></a>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5 pb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="shop.html" class="text-decoration-none">Trang chủ</a></li>
            <li class="breadcrumb-item active">Chi tiết sản phẩm</li>
        </ol>
    </nav>

    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    </div>

    <div class="row g-5" id="product-content" style="display: none;">
        <div class="col-md-5">
            <img id="main-image" src="" class="product-gallery-main shadow-sm mb-3">
            <div class="d-flex gap-2 flex-wrap" id="thumbnail-container"></div>
        </div>

        <div class="col-md-7">
            <div id="flash-sale-badge" class="badge bg-danger mb-2 p-2 fs-6 d-none"><i class="fas fa-bolt me-1"></i> FLASH SALE</div>
            <h2 id="pd-name" class="fw-bold mb-3"></h2>

            <div class="d-flex align-items-center mb-3">
                <div class="text-warning me-2 fw-bold"><i class="fas fa-star"></i> <span id="pd-score">0</span></div>
                <div class="stat-item"><span id="pd-reviews" class="fw-bold">0</span> Đánh giá</div>
                <div class="stat-item"><span id="pd-views" class="fw-bold">0</span> Lượt xem</div>
                <div class="stat-item text-danger"><i class="fas fa-heart"></i> <span id="pd-likes">0</span></div>
            </div>

            <div class="p-4 rounded-4 mb-4" style="background-color: #fff; border: 1px solid #E5E7EB;">
                <div id="price-container"></div>
            </div>

            <div class="row mb-4">
                <div class="col-4 text-muted fw-semibold">Kho hàng</div>
                <div class="col-8 fw-bold" id="pd-stock"></div>
            </div>

            <div class="row mb-4" id="sizes-row" style="display: none;">
                <div class="col-4 text-muted fw-semibold">Phân loại</div>
                <div class="col-8 d-flex gap-2 flex-wrap" id="pd-sizes"></div>
            </div>

            <div class="row mb-4 align-items-center">
                <div class="col-4 text-muted fw-semibold">Số lượng</div>
                <div class="col-8">
                    <input type="number" id="qty-input" class="form-control text-center fw-bold" value="1" min="1" style="width: 100px;">
                </div>
            </div>

            <div class="d-flex gap-3 mt-5">
                <button class="btn btn-add-cart flex-fill" onclick="handleAddToCart()"><i class="fas fa-cart-plus me-2"></i>Thêm vào giỏ</button>
                <button id="btn-like" class="btn btn-outline-danger shadow-sm px-4" style="border-radius: 12px; border-width: 2px;" onclick="handleToggleLike()">
                    <i id="like-icon" class="far fa-heart fs-4"></i>
                </button>
                <button class="btn btn-buy-now flex-fill" onclick="handleBuyNow()">MUA NGAY</button>
            </div>

            <hr class="my-5">
            <h5 class="fw-bold mb-3">Mô tả sản phẩm</h5>
            <div id="pd-description" class="text-muted" style="line-height: 1.8;"></div>
        </div>
    </div>
</div>
<div class="container mt-5 pt-5 border-top">
    <h3 class="fw-bold mb-4"><i class="fas fa-layer-group me-2 text-primary"></i>Sản phẩm tương tự</h3>
    <div class="row g-4" id="related-products-list">
    </div>
</div>

<!-- Modal Buy Now -->
<div class="modal fade" id="buyNowModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header text-white bg-danger" style="border-radius: 16px 16px 0 0;">
                <h5 class="modal-title fw-bold"><i class="fas fa-bolt me-2"></i>Thanh toán nhanh</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form onsubmit="submitBuyNow(event)">
                    <div class="p-3 mb-4 rounded-3 bg-light border border-dashed">
                        <h6 class="fw-bold mb-2" id="bn-productName"></h6>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="text-muted">SL: <strong id="bn-quantity"></strong> x <span id="bn-price"></span></span>
                            <span class="fs-5 fw-bold text-danger" id="bn-total"></span>
                        </div>
                    </div>
                    <input type="hidden" id="bn-productId">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label small fw-bold">Người nhận</label><input type="text" class="form-control" id="bn-receiverName" required></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">SĐT</label><input type="text" class="form-control" id="bn-receiverPhone" required></div>
                        <div class="col-12"><label class="form-label small fw-bold">Địa chỉ</label><input type="text" class="form-control" id="bn-shippingAddress" required></div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Thanh toán</label>
                            <select class="form-select" id="bn-paymentMethod"><option value="COD">Thanh toán khi nhận hàng (COD)</option></select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 mt-4 py-3 fw-bold rounded-pill" id="btn-submit-buynow">CHỐT ĐƠN NGAY</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toast-msg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const BASE_URL = 'http://localhost:8080/api/v1/customer';
    let token = localStorage.getItem('ACCESS_TOKEN');
    const productId = new URLSearchParams(window.location.search).get('id');
    let currentProduct = null;
    let buyNowModalInstance;
    let viewStartTime = Date.now();
    let isProductLiked = false;

    window.onload = function() {
        if (!token) window.location.href = 'auth.html';
        buyNowModalInstance = new bootstrap.Modal(document.getElementById('buyNowModal'));
        fetchProductDetail();
    };

    async function fetchProductDetail() {
        try {
            const response = await fetch(`${BASE_URL}/product/${productId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                currentProduct = await response.json();
                renderDetail(currentProduct);
                fetchRelatedProducts(productId);
                isProductLiked = currentProduct.likedByUser || false;
                updateLikeUI(isProductLiked);
            }
        } catch (e) { console.error(e); }
    }

    function renderDetail(p) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('product-content').style.display = 'flex';
        document.getElementById('pd-name').innerText = p.name;
        document.getElementById('pd-score').innerText = p.averageScore?.toFixed(1) || '5.0';
        document.getElementById('pd-reviews').innerText = p.reviewCount || 0;
        document.getElementById('pd-views').innerText = p.views || 0;
        document.getElementById('pd-likes').innerText = p.likeCounts || 0;
        document.getElementById('pd-stock').innerText = p.stockQuantity || 'Hết hàng';
        document.getElementById('pd-description').innerHTML = p.description?.replace(/\n/g, '<br>') || 'Đang cập nhật...';
        document.getElementById('main-image').src = p.mainImageUrl;

        const priceContainer = document.getElementById('price-container');
        if (p.isOnFlashSale) {
            document.getElementById('flash-sale-badge').classList.remove('d-none');
            priceContainer.innerHTML = `<span class="price-sale me-3">${formatCurrency(p.flashSalePrice)}</span><span class="price-original">${formatCurrency(p.price)}</span>`;
        } else {
            priceContainer.innerHTML = `<span class="price-sale">${formatCurrency(p.price)}</span>`;
        }
    }

    async function handleToggleLike() {
        try {
            const response = await fetch(`${BASE_URL}/product/${productId}/like`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                const res = await response.json();
                isProductLiked = !isProductLiked;
                updateLikeUI(isProductLiked);
                const count = document.getElementById('pd-likes');
                count.innerText = isProductLiked ? parseInt(count.innerText) + 1 : parseInt(count.innerText) - 1;
                showToast(res.message, true);
            }
        } catch (e) { console.error(e); }
    }

    function updateLikeUI(isLiked) {
        const icon = document.getElementById('like-icon');
        const btn = document.getElementById('btn-like');
        if (isLiked) {
            icon.className = 'fas fa-heart fs-4';
            btn.className = 'btn btn-danger shadow-sm px-4';
        } else {
            icon.className = 'far fa-heart fs-4';
            btn.className = 'btn btn-outline-danger shadow-sm px-4';
        }
    }
    async function fetchRelatedProducts(pId) {
        try {
            // Đây là API gọi Item-Based (Sản phẩm tương tự món đang xem)
            const response = await fetch(`${BASE_URL}/product/${pId}/related`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const products = await response.json();
                renderRelatedList(products);
            }
        } catch (e) { console.log("Lỗi tải sản phẩm tương tự"); }
    }

    function renderRelatedList(products) {
        const container = document.getElementById('related-products-list');
        if (products.length === 0) {
            container.innerHTML = '<p class="text-muted">Không có sản phẩm tương tự phù hợp.</p>';
            return;
        }
        container.innerHTML = products.map(p => `
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-2">
                    <img src="${p.mainImageUrl}" class="card-img-top rounded-3" onclick="location.href='product-detail.html?id=${p.id}'" style="cursor:pointer">
                    <div class="card-body px-1 py-2">
                        <h6 class="fw-bold text-truncate mb-1" onclick="location.href='product-detail.html?id=${p.id}'" style="cursor:pointer">${p.name}</h6>
                        <p class="text-danger fw-bold small mb-0">${formatCurrency(p.price)}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function handleBuyNow() {
        const qty = parseInt(document.getElementById('qty-input').value);
        const price = currentProduct.isOnFlashSale ? currentProduct.flashSalePrice : currentProduct.price;
        document.getElementById('bn-productId').value = productId;
        document.getElementById('bn-productName').innerText = currentProduct.name;
        document.getElementById('bn-quantity').innerText = qty;
        document.getElementById('bn-price').innerText = formatCurrency(price);
        document.getElementById('bn-total').innerText = formatCurrency(price * qty);
        buyNowModalInstance.show();
    }

    async function submitBuyNow(event) {
        event.preventDefault();
        const payload = {
            shippingAddress: document.getElementById('bn-shippingAddress').value,
            receiverName: document.getElementById('bn-receiverName').value,
            receiverPhone: document.getElementById('bn-receiverPhone').value,
            paymentMethod: 'COD',
            items: [{ productId: productId, quantity: parseInt(document.getElementById('bn-quantity').innerText) }]
        };
        const response = await fetch(`${BASE_URL}/order`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) {
            trackUserActivity(productId, 'BUY');
            alert("Đặt hàng thành công!");
            window.location.href = 'history.html';
        }
    }

    function trackUserActivity(pId, type, stay = 0) {
        fetch(`${BASE_URL}/activity-logs`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: pId, action: type, stayTime: stay }),
            keepalive: true
        });
    }

    window.addEventListener('beforeunload', () => {
        const stay = (Date.now() - viewStartTime) / 1000;
        trackUserActivity(productId, 'VIEW', stay);
    });

    function formatCurrency(v) { return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(v); }
    function showToast(m, s) {
        const t = document.getElementById('liveToast');
        t.className = `toast align-items-center text-white border-0 ${s ? 'bg-success' : 'bg-danger'}`;
        document.getElementById('toast-msg').innerText = m;
        new bootstrap.Toast(t).show();
    }
</script>
</body>
</html>
