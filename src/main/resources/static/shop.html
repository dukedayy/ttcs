<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duke Shop - Mua sắm thả ga</title>
    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --danger-color: #EF4444;
            --text-main: #1F2937;
            --bg-light: #F3F4F6;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
        }

        /* Navbar hiện đại */
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .navbar-brand { color: var(--primary-color) !important; font-weight: 800; font-size: 1.5rem; }
        .nav-link { color: #4B5563 !important; font-weight: 500; transition: color 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--primary-color) !important; }

        /* Card Sản Phẩm */
        .product-card {
            border: none;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .card-img-wrapper {
            position: relative;
            padding-top: 100%; /* Ratio 1:1 */
            overflow: hidden;
            border-radius: 16px 16px 0 0;
            background-color: #f8f9fa;
        }
        .card-img-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1rem;
            transition: transform 0.5s ease;
        }
        .product-card:hover .card-img-top { transform: scale(1.05); }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .price-tag { color: var(--danger-color); font-size: 1.35rem; font-weight: 800; }

        /* Buttons */
        .btn-add-cart {
            background-color: #E0E7FF;
            color: var(--primary-color);
            border: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add-cart:hover:not(:disabled) { background-color: var(--primary-color); color: white; }

        .btn-buy-now {
            background-color: var(--danger-color);
            border: none;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .btn-buy-now:hover:not(:disabled) { background-color: #DC2626; transform: translateY(-2px); }

        /* Pagination Style */
        .pagination { gap: 5px; }
        .page-link {
            border: none;
            border-radius: 8px !important;
            color: #4B5563;
            font-weight: 600;
            padding: 8px 16px;
            transition: all 0.2s;
        }
        .page-link:hover:not(.disabled) { background-color: #E5E7EB; color: var(--primary-color); }
        .page-item.active .page-link { background-color: var(--primary-color); color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        .page-item.disabled .page-link { background-color: transparent; color: #9CA3AF; }

        /* Input Number Custom */
        .qty-input {
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }
        .qty-input:focus { border-color: var(--primary-color); box-shadow: none; }

        .section-title {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
            font-weight: 800;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 50%;
            height: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }
    </style>
</head>

        buyNowModalInstance = new bootstrap.Modal(document.getElementById('buyNowModal'));

        fetchProducts(0);
    };

function trackUserActivity(productId, actionType, stayTime = 0) {
    const token = localStorage.getItem('ACCESS_TOKEN');
    if (!token) return;

    fetch('http://localhost:8080/api/v1/customer/activity-logs', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            productId: productId,
            action: actionType,
            stayTime: stayTime // Nếu là VIEW thì có giây, còn BUY/CART thì mặc định là 0
        }),
        keepalive: true // Cờ phép thuật: Kể cả khách tắt tab, dữ liệu vẫn bay về server!
    }).catch(e => console.log("Lỗi gửi log ngầm"));
}
    async function fetchProducts(page = 0) {
        currentPage = page;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('product-list').innerHTML = '';
        document.getElementById('pagination-container').style.setProperty('display', 'none', 'important');

        try {
            const response = await fetch(`${BASE_URL}/product?page=${currentPage}&size=${PAGE_SIZE}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 401 || response.status === 403) {
                logout();
                return;
            }

            const data = await response.json();
            totalPages = data.totalPages || 0;

            renderProducts(data.content || []);
            renderPaginationNumbers(); // Gọi hàm render thanh phân trang mới

        } catch (error) {
            document.getElementById('loading').innerHTML = '<p class="text-danger fw-bold">Lỗi kết nối máy chủ!</p>';
        }
    }

    function renderProducts(products) {
    const productList = document.getElementById('product-list');
    document.getElementById('loading').style.display = 'none';

    if (products.length === 0) {
        productList.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="fas fa-box-open fs-1 mb-3"></i><br><h4>Chưa có sản phẩm nào.</h4></div>';
        return;
    }

    productList.innerHTML = products.map(p => `
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card product-card h-100">
                ${p.stockQuantity > 0 ? `<span class="badge bg-success shadow-sm stock-badge">Kho: ${p.stockQuantity}</span>` : `<span class="badge bg-danger shadow-sm stock-badge">Hết hàng</span>`}

                <!-- Click vào ảnh sẽ sang trang product-detail.html -->
                <div class="card-img-wrapper" style="cursor: pointer;" onclick="goToDetail('${p.id}')">
                    <img src="${p.mainImageUrl || 'https://via.placeholder.com/300x300'}" class="card-img-top">
                </div>

                <div class="card-body d-flex flex-column p-4">
                    <!-- Click vào tên cũng sang trang product-detail.html -->
                    <h5 class="card-title text-truncate" style="cursor: pointer;" title="${p.name}" onclick="goToDetail('${p.id}')">${p.name}</h5>

                    <p class="card-text text-muted small mb-3 text-truncate">${p.description || 'Chưa có mô tả'}</p>
                    <div class="price-tag mb-4">${formatCurrency(p.price)}</div>

                    <div class="mt-auto d-flex flex-column gap-2">
                        <div class="d-flex gap-2">
                            <input type="number" id="qty-${p.id}" class="form-control text-center qty-input" value="1" min="1" max="${p.stockQuantity}" style="width: 70px;" ${p.stockQuantity === 0 ? 'disabled' : ''}>
                            <button class="btn btn-add-cart flex-grow-1" onclick="addToCart('${p.id}', ${p.stockQuantity})" ${p.stockQuantity === 0 ? 'disabled' : ''}>
                                <i class="fas fa-cart-plus me-1"></i> Thêm giỏ
                            </button>
                        </div>

                        <!-- Nút MUA NGAY vẫn giữ nguyên để hiện Modal tại trang chủ -->
                        <button class="btn btn-buy-now text-white w-100" onclick="openBuyNow('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, ${p.stockQuantity})" ${p.stockQuantity === 0 ? 'disabled' : ''}>
                            MUA NGAY
                        </button>

                        <!-- Thêm nút Xem chi tiết cho rõ ràng (Tùy chọn) -->
                        <button class="btn btn-outline-primary btn-sm mt-2 border-0" onclick="goToDetail('${p.id}')">
                            Xem chi tiết <i class="fas fa-arrow-right ms-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

    function goToDetail(productId) {
        window.location.href = `product-detail.html?id=${productId}`;
    }

    //SEARCH
    // Bắt sự kiện nhấn phím Enter trong ô input cho tiện
document.getElementById('search-input')?.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        handleSearch();
    }
});

async function handleSearch(page = 0) {
    const keyword = document.getElementById('search-input').value.trim();
    const resultInfo = document.getElementById('search-result-info');

    // Nếu để trống thì load lại toàn bộ sản phẩm như ban đầu
    if (!keyword) {
        resultInfo.classList.add('d-none');
        fetchProducts(0); // Gọi lại hàm load mặc định của sếp
        return;
    }

    try {
        // q là tham số keyword sếp đặt ở Controller
        const response = await fetch(`${BASE_URL}/product/search?q=${encodeURIComponent(keyword)}&page=${page}&size=12`);

        if (response.ok) {
            const data = await response.json();

            // Hiển thị thông báo tìm thấy bao nhiêu kết quả
            resultInfo.innerText = `Tìm thấy ${data.totalElements} sản phẩm cho "${keyword}"`;
            resultInfo.classList.remove('d-none');

            // Dùng chính hàm render cũ của sếp để vẽ lại danh sách
            renderProducts(data.content);

            // Nếu sếp có làm phân trang thì cập nhật luôn
            if (typeof renderPagination === "function") {
                renderPagination(data.totalPages, page, 'handleSearch');
            }
        } else {
            console.error("Lỗi khi tìm kiếm");
        }
    } catch (error) {
        console.error("Lỗi kết nối:", error);
    }
}

    // THUẬT TOÁN RENDER NÚT PHÂN TRANG THÔNG MINH
    function renderPaginationNumbers() {
        if (totalPages <= 0) return;

        document.getElementById('pagination-container').style.setProperty('display', 'flex', 'important');
        const ul = document.getElementById('pagination-ul');
        let html = '';

        // Nút Trước
        html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <button class="page-link" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
                 </li>`;

        // Logic sinh số trang (hiển thị tối đa 5 nút xung quanh trang hiện tại)
        let startPage = Math.max(0, currentPage - 2);
        let endPage = Math.min(totalPages - 1, currentPage + 2);

        // Điều chỉnh nếu đang ở đầu hoặc cuối
        if (currentPage <= 2) endPage = Math.min(4, totalPages - 1);
        if (currentPage >= totalPages - 3) startPage = Math.max(0, totalPages - 5);

        // Nút trang 1 (Nếu startPage > 0)
        if (startPage > 0) {
            html += `<li class="page-item"><button class="page-link" onclick="fetchProducts(0)">1</button></li>`;
            if (startPage > 1) {
                html += `<li class="page-item disabled"><span class="page-link border-0">...</span></li>`;
            }
        }

        // Các nút ở giữa
        for (let i = startPage; i <= endPage; i++) {
            if (i === currentPage) {
                html += `<li class="page-item active"><button class="page-link">${i + 1}</button></li>`;
            } else {
                html += `<li class="page-item"><button class="page-link" onclick="fetchProducts(${i})">${i + 1}</button></li>`;
            }
        }

        // Nút trang cuối (Nếu endPage < totalPages - 1)
        if (endPage < totalPages - 1) {
            if (endPage < totalPages - 2) {
                html += `<li class="page-item disabled"><span class="page-link border-0">...</span></li>`;
            }
            html += `<li class="page-item"><button class="page-link" onclick="fetchProducts(${totalPages - 1})">${totalPages}</button></li>`;
        }

        // Nút Sau
        html += `<li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <button class="page-link" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
                 </li>`;

        ul.innerHTML = html;
    }

    function changePage(direction) {
        const newPage = currentPage + direction;
        if (newPage >= 0 && newPage < totalPages) {
            fetchProducts(newPage);
            // Vuốt lên thẻ h2 để mượt hơn
            document.querySelector('.section-title').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // 1. CÀI MÁY NGHE LÉN (Hàm dùng chung)
    function trackUserActivity(productId, actionType, stayTime = 0) {
        const token = localStorage.getItem('ACCESS_TOKEN');
        if (!token) return;

        fetch('http://localhost:8080/api/v1/customer/activity-logs', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                productId: productId,
                action: actionType,
                stayTime: stayTime
            }),
            keepalive: true
        }).catch(e => console.log("Lỗi gửi log ngầm"));
    }

    // 2. HÀM THÊM GIỎ HÀNG (Đã gộp)
    async function addToCart(productId, maxStock) {
        const quantity = parseInt(document.getElementById(`qty-${productId}`).value);
        if (quantity > maxStock) {
            showToast(`Kho chỉ còn ${maxStock} sản phẩm!`, false);
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/add-to-cart`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId, quantity: quantity })
            });

            if (response.ok) {
                showToast(`Đã thêm ${quantity} sản phẩm vào giỏ!`, true);

                // MÁY NGHE LÉN HOẠT ĐỘNG: Ghi log Thêm giỏ hàng
                trackUserActivity(productId, 'ADD_TO_CART');
            } else {
                const data = await response.json();
                showToast(data.message || 'Lỗi khi thêm vào giỏ', false);
            }
        } catch (error) {
            showToast('Lỗi kết nối máy chủ', false);
        }
    }

    function openBuyNow(productId, productName, price, maxStock) {
        const quantity = parseInt(document.getElementById(`qty-${productId}`).value);
        if (quantity > maxStock) {
            showToast(`Kho chỉ còn ${maxStock} sản phẩm!`, false);
            return;
        }

        document.getElementById('bn-productId').value = productId;
        document.getElementById('bn-productName').innerText = productName;
        document.getElementById('bn-quantity').innerText = quantity;
        document.getElementById('bn-price').innerText = formatCurrency(price);
        document.getElementById('bn-total').innerText = formatCurrency(price * quantity);

        buyNowModalInstance.show();
    }

    // 3. HÀM CHỐT ĐƠN (Đã gộp)
    async function submitBuyNow(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-submit-buynow');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>ĐANG XỬ LÝ...';

        const payload = {
            shippingAddress: document.getElementById('bn-shippingAddress').value,
            receiverName: document.getElementById('bn-receiverName').value,
            receiverPhone: document.getElementById('bn-receiverPhone').value,
            paymentMethod: document.getElementById('bn-paymentMethod').value,
            note: document.getElementById('bn-note').value,
            items: [{ productId: document.getElementById('bn-productId').value, quantity: parseInt(document.getElementById('bn-quantity').innerText) }]
        };

        try {
            const response = await fetch(`${BASE_URL}/order`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                alert(`🎉 Đặt hàng thành công! Mã đơn: ${data.orderCode || data.id}`);

                // MÁY NGHE LÉN HOẠT ĐỘNG: Ghi log Mua hàng
                const pId = document.getElementById('bn-productId').value;
                trackUserActivity(pId, 'BUY');

                buyNowModalInstance.hide();
                window.location.href = 'history.html';
            } else {
                alert('Lỗi: ' + (data.message || 'Không thể đặt hàng!'));
            }
        } catch (error) {
            alert('Lỗi kết nối máy chủ!');
        } finally {
            btn.disabled = false;
            btn.innerText = 'CHỐT ĐƠN NGAY';
        }
    }
    function handleSearch() {
    const keyword = document.getElementById('search-input').value;
    if (keyword.trim()) {
        // Gọi API tìm kiếm và render lại danh sách sản phẩm
        fetch(`${BASE_URL}/product/search?q=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(data => {
                renderProducts(data.content);
                renderPagination(data);
            });
    }
}

    function formatCurrency(amount) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    }

    function showToast(message, isSuccess) {
        const toastEl = document.getElementById('liveToast');
        toastEl.className = `toast align-items-center text-white border-0 ${isSuccess ? 'bg-success' : 'bg-danger'}`;
        document.getElementById('toast-msg').innerText = message;
        new bootstrap.Toast(toastEl).show();
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'auth.html';
    }

    // 4. MÁY NGHE LÉN ĐO THỜI GIAN VIEW (Gắn ở cuối cùng)
    let viewStartTime = 0;

    // Lúc bảng Mua Ngay hiện lên
    document.getElementById('buyNowModal').addEventListener('shown.bs.modal', function () {
        viewStartTime = Date.now();
    });

    // Lúc tắt bảng Mua Ngay đi
    document.getElementById('buyNowModal').addEventListener('hidden.bs.modal', function () {
        if (viewStartTime > 0) {
            const stayTimeInSeconds = (Date.now() - viewStartTime) / 1000;
            const pId = document.getElementById('bn-productId').value;

            // Bắn log VIEW về DB kèm số giây
            trackUserActivity(pId, 'VIEW', stayTimeInSeconds);
            viewStartTime = 0;
        }
    });
    // Hàm chuyển hướng sang trang chi tiết sản phẩm
    function goToDetail(productId) {
        // Gắn ID sản phẩm vào thẳng URL
        window.location.href = `product-detail.html?id=${productId}`;
    }
</script>
</body>
</html>
